<!-- guards: beautiful-first-design, oeff, core/color, core/interaction, core/layout, core/typography, assets/svg-library -->
<!DOCTYPE html>
<html lang="en" data-domain="forest">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OEFF Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       OEFF (Forest) — Beautiful-First Design System
       ======================================== */
    :root {
      /* -- Primitives -- */
      --forest-canopy: #1a2e22;
      --forest-understory: #2d4a3a;
      --forest-deep: #3a5c4d;
      --forest-sage: #5c7c6b;
      --forest-lichen: #8aaa98;
      --forest-mist: #c8d9ce;

      --ink: #2c2825;
      --ink-soft: #5c5550;
      --ink-muted: #8a8580;
      --cream: #f7f5f2;
      --paper: #faf9f7;
      --linen: #f0ede8;

      --signal-critical: #c44b4b;
      --signal-warning: #996622;
      --signal-success: #5c8c4b;
      --signal-info: #4b7c8c;

      /* -- Semantic Tokens -- */
      --color-ground: var(--cream);
      --color-surface: var(--paper);
      --color-surface-raised: #ffffff;
      --color-surface-inset: var(--linen);
      --color-primary: var(--forest-sage);
      --color-primary-deep: var(--forest-deep);
      --color-primary-dark: var(--forest-canopy);
      --color-primary-light: var(--forest-mist);
      --color-accent: var(--forest-sage);
      --color-text: var(--ink);
      --color-text-soft: var(--ink-soft);
      --color-text-muted: var(--ink-muted);
      --color-border: var(--forest-mist);

      /* -- Layer backgrounds (semantic) -- */
      --layer-core-bg: #dce8e0;
      --layer-relational-bg: #e8e3dd;
      --layer-output-bg: var(--linen);
      --layer-resilience-bg: #f5f3f0;

      /* -- Badge tint backgrounds (semantic) -- */
      --color-badge-success-bg: #e3eedf;
      --color-badge-warning-bg: #eee8df;
      --color-badge-caution-bg: #f0e8d8;
      --color-badge-critical-bg: #f0dede;

      --shadow-warm: hsla(25, 40%, 30%, 0.08);
      --shadow-soft: 0 2px 8px var(--shadow-warm);
      --shadow-medium: 0 4px 16px var(--shadow-warm);

      --radius-sm: 8px;
      --radius-md: 12px;

      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --font-body-sans: 'Source Sans 3', system-ui, sans-serif;
      --font-mono: 'Source Code Pro', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body-sans);
      font-size: 16px;
      line-height: 1.65;
      color: var(--color-text);
      background-color: var(--color-ground);
      background-image: radial-gradient(circle, hsla(25, 40%, 30%, 0.005) 1px, transparent 1px);
      background-size: 4px 4px;
      min-height: 100vh;
    }

    /* Biophilic noise overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      filter: url(#paper-grain);
      mix-blend-mode: multiply;
    }

    /* ── Layout ── */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--color-primary);
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-bottom: 0.25rem;
    }
    .page-header .org-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    /* ── Tab Nav ── */
    .tab-nav {
      display: flex;
      gap: 0;
      justify-content: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--color-border);
    }
    .tab-nav button {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      background: none;
      border: none;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 200ms ease, border-color 200ms ease;
      min-height: 44px;
      min-width: 44px;
    }
    .tab-nav button:hover {
      color: var(--color-text-soft);
    }
    .tab-nav button.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }
    .tab-nav button:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: -2px;
    }

    /* ── Ring Diagram (Hero Illustration) ── */
    .ring-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1rem;
      position: relative;
    }
    .ring-hero > svg:first-of-type {
      width: 380px;
      height: 380px;
    }
    .ring-headline {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.25rem;
      color: var(--color-primary-deep);
      text-align: center;
      margin-top: 1rem;
      max-width: 40ch;
    }
    .ring-legend {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    .ring-legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .ring-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .ring-legend-dot--core { background: var(--color-primary); }
    .ring-legend-dot--relational { background: var(--signal-info); }
    .ring-legend-dot--output { background: var(--color-text-muted); }
    .ring-legend-dot--resilience { background: var(--color-primary-light); border: 1px dashed var(--color-text-muted); }

    /* ── Connection Lines SVG ── */
    #connection-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .connection-line {
      fill: none;
      stroke: var(--color-primary-light);
      stroke-width: 1.5;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    .connection-line.visible {
      opacity: 0.35;
    }

    /* ── Layer Sections ── */
    .layer-section {
      margin-bottom: 1.5rem;
      padding: 1.25rem 1.5rem;
      border-radius: var(--radius-md);
      position: relative;
    }
    .layer-section.core { background: var(--layer-core-bg); }
    .layer-section.relational { background: var(--layer-relational-bg); }
    .layer-section.output { background: var(--layer-output-bg); }
    .layer-section.resilience {
      background: var(--layer-resilience-bg);
      border-left: 3px dashed var(--color-text-muted);
    }
    .layer-label {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 14px;
      color: var(--color-primary);
      margin-bottom: 0.75rem;
      display: block;
    }
    .layer-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    /* ── Entity Cards ── */
    .entity-card {
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      cursor: pointer;
      transition: box-shadow 200ms ease, border-color 200ms ease, transform 100ms ease;
      min-width: 140px;
      max-width: 220px;
      flex: 0 1 auto;
      min-height: 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .entity-card:hover {
      box-shadow: var(--shadow-soft);
      border-color: var(--color-primary);
      transform: translateY(-1px);
    }
    .entity-card:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    .entity-card.selected {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-medium);
      background: var(--color-surface);
    }
    .entity-card.visited {
      opacity: 0.88;
    }
    .entity-card-name {
      font-family: var(--font-body-sans);
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.3;
    }
    .entity-card-desc {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--color-text-soft);
      line-height: 1.4;
      margin-top: 3px;
    }

    /* ── Detail Panel ── */
    .detail-overlay {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(480px, 92vw);
      background: var(--color-surface-raised);
      border-left: 1px solid var(--color-border);
      box-shadow: -4px 0 24px var(--shadow-warm);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1.75rem;
      transform: translateX(100%);
      transition: transform 300ms ease;
    }
    .detail-overlay.open {
      display: block;
      transform: translateX(0);
    }
    .detail-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 200ms ease;
    }
    .detail-close:hover {
      background: var(--color-surface-inset);
    }
    .detail-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-bottom: 0.5rem;
      padding-right: 48px;
    }
    .detail-synthesis {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 15px;
      color: var(--color-text-soft);
      line-height: 1.6;
      margin-bottom: 1.25rem;
      max-width: 50ch;
    }
    .detail-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .badge {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.03em;
    }
    .badge-layer-core { background: var(--layer-core-bg); color: var(--color-primary-deep); }
    .badge-layer-relational { background: var(--layer-relational-bg); color: var(--color-text-soft); }
    .badge-layer-output { background: var(--layer-output-bg); color: var(--color-text-soft); }
    .badge-layer-resilience { background: var(--layer-resilience-bg); color: var(--color-text-muted); border: 1px dashed var(--color-text-muted); }
    .badge-platform { background: var(--color-surface-inset); color: var(--color-text-soft); }
    .badge-lifecycle-yoy { background: var(--color-badge-success-bg); color: var(--signal-success); }
    .badge-lifecycle-seasonal { background: var(--color-badge-warning-bg); color: var(--signal-warning); }
    .badge-risk-low { background: var(--color-badge-success-bg); color: var(--signal-success); }
    .badge-risk-medium { background: var(--color-badge-caution-bg); color: var(--signal-warning); }
    .badge-risk-high { background: var(--color-badge-critical-bg); color: var(--signal-critical); }

    .detail-section-label {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-primary);
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .detail-fields {
      margin-top: 0;
    }
    .detail-fields summary {
      font-family: var(--font-body-sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-soft);
      cursor: pointer;
      padding: 0.5rem 0;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .detail-fields-content {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--color-text-soft);
      line-height: 1.8;
      padding: 0.5rem 0 0.5rem 1rem;
      border-left: 2px solid var(--color-border);
      margin-left: 0.5rem;
    }
    .detail-related {
      margin-top: 0.25rem;
    }
    .detail-related-link {
      font-family: var(--font-body-sans);
      font-size: 14px;
      color: var(--color-primary-deep);
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px solid var(--color-border);
      transition: border-color 200ms ease;
      display: inline-block;
      margin-right: 1rem;
      margin-bottom: 0.25rem;
      padding: 2px 0;
      min-height: 44px;
      line-height: 44px;
    }
    .detail-related-link:hover {
      border-bottom-color: var(--color-primary);
    }

    /* ── Scrim ── */
    .scrim {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: hsla(25, 20%, 15%, 0.2);
      z-index: 99;
    }
    .scrim.open { display: block; }

    /* ── Tab Content Areas ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Platforms View ── */
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .platform-card {
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      transition: box-shadow 200ms ease;
    }
    .platform-card:hover {
      box-shadow: var(--shadow-soft);
    }
    .platform-card h3 {
      font-family: var(--font-body-sans);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .platform-card .access-tag {
      font-family: var(--font-mono);
      font-size: 12px;
      display: inline-block;
      margin-bottom: 0.5rem;
    }
    .access-centralized { color: var(--signal-success); }
    .access-personal { color: var(--signal-critical); }
    .access-shared { color: var(--signal-warning); }
    .platform-entities {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text-soft);
      line-height: 1.6;
    }

    /* ── Timeline View ── */
    .timeline {
      display: flex;
      gap: 0;
      overflow-x: auto;
      padding-bottom: 1rem;
    }
    .timeline-phase {
      flex: 1;
      min-width: 150px;
      padding: 1.25rem 1rem;
      border-right: 1px solid var(--color-border);
      transition: background 200ms ease;
    }
    .timeline-phase:last-child { border-right: none; }
    .timeline-phase.current {
      background: var(--layer-core-bg);
      border-radius: var(--radius-sm);
    }
    .timeline-phase h3 {
      font-family: var(--font-body-sans);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .timeline-phase .phase-time {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--color-text-muted);
      margin-bottom: 0.5rem;
    }
    .timeline-phase p {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--color-text-soft);
      line-height: 1.5;
    }

    /* ── Roles View ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .role-card {
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
    }
    .role-card h3 {
      font-family: var(--font-body-sans);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .role-section-label {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .role-entity-list {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text-soft);
      line-height: 1.6;
    }

    /* ── Risk View ── */
    .risk-section {
      margin-bottom: 1.5rem;
    }
    .risk-section h3 {
      font-family: var(--font-body-sans);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .risk-tag {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 0.4rem;
    }
    .risk-tag--low { background: var(--signal-success); }
    .risk-tag--medium { background: var(--signal-warning); }
    .risk-tag--high { background: var(--signal-critical); }
    .risk-items {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .risk-item {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text-soft);
      background: var(--color-surface-raised);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 6px 12px;
    }
    .risk-synthesis {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 14px;
      color: var(--color-text-soft);
      max-width: 72ch;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .ring-hero > svg:first-of-type { width: 280px; height: 280px; }
      .entity-card { min-width: 120px; max-width: 100%; }
      .page-wrap { padding: 1rem; }
      .tab-nav { flex-wrap: wrap; }
      .tab-nav button { padding: 0.5rem 0.75rem; }
    }
  </style>
</head>
<body>

<!-- SVG Filters -->
<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0">
  <defs>
    <filter id="paper-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
    </filter>
  </defs>
</svg>

<div class="page-wrap" id="app">

  <!-- Header -->
  <header class="page-header">
    <h1>OEFF Architecture</h1>
    <span class="org-name">One Earth Film Festival</span>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav" role="tablist" aria-label="Architecture views">
    <button role="tab" class="active" data-tab="diagram" aria-selected="true">Diagram</button>
    <button role="tab" data-tab="platforms" aria-selected="false">Platforms</button>
    <button role="tab" data-tab="timeline" aria-selected="false">Timeline</button>
    <button role="tab" data-tab="roles" aria-selected="false">Roles</button>
    <button role="tab" data-tab="risk" aria-selected="false">Risk</button>
  </nav>

  <!-- ════════════════════════════════════════════ -->
  <!-- TAB: Diagram (default)                      -->
  <!-- ════════════════════════════════════════════ -->
  <div class="tab-content active" id="tab-diagram" role="tabpanel">

    <!-- Ring Hero -->
    <div class="ring-hero" id="ring-hero">
      <svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Concentric ring diagram: Events at center, surrounded by Core, Relational, Output, and Resilience layers">
        <!-- Ring bands (back to front) -->
        <circle cx="190" cy="190" r="185" fill="var(--layer-resilience-bg)" stroke="var(--color-border)" stroke-width="1" opacity="0.7"/>
        <circle cx="190" cy="190" r="150" fill="var(--layer-output-bg)" stroke="var(--color-border)" stroke-width="1"/>
        <circle cx="190" cy="190" r="110" fill="var(--layer-relational-bg)" stroke="var(--color-border)" stroke-width="1"/>
        <circle cx="190" cy="190" r="70"  fill="var(--layer-core-bg)" stroke="var(--color-primary)" stroke-width="1"/>
        <circle cx="190" cy="190" r="32"  fill="var(--color-primary-light)" stroke="var(--color-primary)" stroke-width="1.5"/>

        <!-- Center label -->
        <text x="190" y="194" text-anchor="middle" font-family="var(--font-body-sans)" font-size="14" font-weight="700" fill="var(--color-primary-dark)">Events</text>

        <!-- Ring band labels (subtle) -->
        <text x="190" y="52" text-anchor="middle" font-family="var(--font-mono)" font-size="12" fill="var(--color-text-muted)" opacity="0.6">CORE</text>
        <text x="190" y="88" text-anchor="middle" font-family="var(--font-mono)" font-size="12" fill="var(--color-text-muted)" opacity="0.5">RELATIONAL</text>
        <text x="190" y="133" text-anchor="middle" font-family="var(--font-mono)" font-size="12" fill="var(--color-text-muted)" opacity="0.4">OUTPUTS</text>
        <text x="190" y="18" text-anchor="middle" font-family="var(--font-mono)" font-size="12" fill="var(--color-text-muted)" opacity="0.35">RESILIENCE</text>
      </svg>

      <!-- Connection lines drawn here dynamically -->
      <svg id="connection-lines"></svg>

      <p class="ring-headline">Everything connects through Events</p>

// ═══════ Render Cards ═══════
function renderCards() {
  var layers = ['core', 'relational', 'output', 'resilience'];
  layers.forEach(function(layer) {
    var container = document.getElementById('cards-' + layer);
    var entities = ENTITIES.filter(function(e) { return e.layer === layer; });
    container.innerHTML = entities.map(function(e) {
      var classes = 'entity-card';
      if (visitedEntities.has(e.id)) classes += ' visited';
      if (selectedEntity === e.id) classes += ' selected';
      return '<div class="' + classes + '" tabindex="0" data-entity="' + e.id + '" role="button" aria-label="' + e.name + ': ' + e.shortDesc + '">' +
        '<span class="entity-card-name">' + e.name + '</span>' +
        '<span class="entity-card-desc">' + e.shortDesc + '</span>' +
      '</div>';
    }).join('');
  });

  // Bind events
  document.querySelectorAll('.entity-card').forEach(function(card) {
    card.addEventListener('click', function() { openEntity(card.dataset.entity); });
    card.addEventListener('keydown', function(ev) { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); openEntity(card.dataset.entity); } });
    card.addEventListener('mouseenter', function() { drawConnectionLine(card); });
    card.addEventListener('mouseleave', clearConnectionLines);
  });
}

// ═══════ Connection Lines ═══════
function drawConnectionLine(cardEl) {
  var entityId = cardEl.dataset.entity;
  var entity = ENTITIES.find(function(e) { return e.id === entityId; });
  if (!entity) return;

  var ringHero = document.getElementById('ring-hero');
  var svgEl = document.getElementById('connection-lines');
  var cardRect = cardEl.getBoundingClientRect();

  var wrapRect = document.querySelector('.page-wrap').getBoundingClientRect();
  svgEl.style.position = 'absolute';
  svgEl.style.top = '0';
  svgEl.style.left = '0';
  svgEl.style.width = wrapRect.width + 'px';
  var totalHeight = document.getElementById('tab-diagram').offsetHeight;
  svgEl.style.height = totalHeight + 'px';
  svgEl.style.pointerEvents = 'none';
  svgEl.style.zIndex = '10';
  svgEl.setAttribute('viewBox', '0 0 ' + wrapRect.width + ' ' + totalHeight);

  var cardCX = cardRect.left + cardRect.width / 2 - wrapRect.left;
  var cardCY = cardRect.top + cardRect.height / 2 - wrapRect.top;

  var ringSvg = ringHero.querySelector('svg:first-of-type');
  var ringSvgRect = ringSvg.getBoundingClientRect();
  var ringCenterX = ringSvgRect.left + ringSvgRect.width / 2 - wrapRect.left;
  var ringCenterY = ringSvgRect.top + ringSvgRect.height / 2 - wrapRect.top;

  var zone = RING_ZONES[entity.layer];
  var scale = ringSvgRect.width / 380;
  var angle = Math.atan2(cardCY - ringCenterY, cardCX - ringCenterX);
  var targetX = ringCenterX + Math.cos(angle) * zone.r * scale;
  var targetY = ringCenterY + Math.sin(angle) * zone.r * scale;

  var midY = (cardCY + targetY) / 2;
  var cpX = (cardCX + targetX) / 2;

  svgEl.innerHTML = '<path class="connection-line visible" d="M ' + cardCX + ' ' + cardCY + ' Q ' + cpX + ' ' + (midY - 30) + ' ' + targetX + ' ' + targetY + '"/>';
}

function clearConnectionLines() {
  document.getElementById('connection-lines').innerHTML = '';
}

      '<span class="badge badge-platform">' + entity.platform + '</span>' +
      '<span class="badge badge-lifecycle-' + (entity.lifecycle === 'yoy' ? 'yoy' : 'seasonal') + '">' + lifecycleLabel + '</span>' +
      '<span class="badge badge-risk-' + entity.risk + '">' + riskLabels[entity.risk] + '</span>' +
    '</div>' +
    '<div class="detail-section-label">Fields</div>' +
    '<details class="detail-fields">' +
      '<summary>View field schema</summary>' +
      '<div class="detail-fields-content">' + entity.fields + '</div>' +
    '</details>' +
    '<div class="detail-section-label">Related Entities</div>' +
    '<div class="detail-related">' + relatedHTML + '</div>';

  document.querySelectorAll('.detail-related-link').forEach(function(link) {
    link.addEventListener('click', function() { openEntity(link.dataset.entity); });
  });

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('scrim').classList.add('open');
  renderCards();
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('scrim').classList.remove('open');
  selectedEntity = null;
  renderCards();
}

document.getElementById('detail-close').addEventListener('click', closePanel);
document.getElementById('scrim').addEventListener('click', closePanel);
document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape') closePanel();
});

// ═══════ Platforms View ═══════
function renderPlatforms() {
  var grid = document.getElementById('platform-grid');
  grid.innerHTML = PLATFORMS.map(function(p) {
    var accessClass = p.access === 'centralized' ? 'access-centralized' : p.access === 'personal' ? 'access-personal' : 'access-shared';
    var accessLabel = p.access === 'centralized' ? 'Centralized' : p.access === 'personal' ? 'Personal infra' : 'Personal \u2192 Team';
    return '<div class="platform-card">' +
      '<h3>' + p.name + '</h3>' +
      '<span class="access-tag ' + accessClass + '">' + accessLabel + '</span>' +
      '<p class="platform-entities">' + p.entities.join(', ') + '</p>' +
    '</div>';
  }).join('');
}

// ═══════ Timeline View ═══════
function renderTimeline() {
  var tl = document.getElementById('timeline');
  tl.innerHTML = TIMELINE_PHASES.map(function(p) {
    return '<div class="timeline-phase' + (p.current ? ' current' : '') + '">' +
      '<h3>' + p.name + '</h3>' +
      '<span class="phase-time">' + p.time + '</span>' +
      '<p>' + p.desc + '</p>' +
    '</div>';
  }).join('');
}

// ═══════ Roles View ═══════
function renderRoles() {
  var grid = document.getElementById('role-grid');
  grid.innerHTML = ROLES.map(function(r) {
    return '<div class="role-card">' +
      '<h3>' + r.name + '</h3>' +
      '<div class="role-section-label">Creates / Owns</div>' +
      '<div class="role-entity-list">' + r.owns + '</div>' +
      '<div class="role-section-label">Edits / Maintains</div>' +
      '<div class="role-entity-list">' + r.edits + '</div>' +
      '<div class="role-section-label">Reads / Consumes</div>' +
      '<div class="role-entity-list">' + r.reads + '</div>' +
    '</div>';
  }).join('');
}

// ═══════ Risk View ═══════
function renderRisk() {
  var container = document.getElementById('risk-content');
  var riskGroups = {
    low: ENTITIES.filter(function(e) { return e.risk === 'low'; }),
    medium: ENTITIES.filter(function(e) { return e.risk === 'medium'; }),
    high: ENTITIES.filter(function(e) { return e.risk === 'high'; })
  };

  container.innerHTML =
    '<div class="risk-section">' +
      '<h3><span class="risk-tag risk-tag--low"></span> Low \u2014 Centralized org accounts</h3>' +
      '<div class="risk-items">' + riskGroups.low.map(function(e) { return '<span class="risk-item">' + e.name + '</span>'; }).join('') + '</div>' +
    '</div>' +
    '<div class="risk-section">' +
      '<h3><span class="risk-tag risk-tag--medium"></span> Medium \u2014 Shared from personal or git-backed</h3>' +
      '<div class="risk-items">' + riskGroups.medium.map(function(e) { return '<span class="risk-item">' + e.name + '</span>'; }).join('') + '</div>' +
    '</div>' +
    '<div class="risk-section">' +
      '<h3><span class="risk-tag risk-tag--high"></span> High \u2014 Personal machine only</h3>' +
      '<div class="risk-items">' + (riskGroups.high.length ? riskGroups.high.map(function(e) { return '<span class="risk-item">' + e.name + '</span>'; }).join('') : '<span class="risk-item" style="opacity:0.5">None in current entity set (scripts, API tokens, email pipelines are infrastructure, not entities)</span>') + '</div>' +
    '</div>' +
    '<p class="risk-synthesis">Centralized platforms survive role changes. Personal infrastructure is the fragile layer. The Integration Registry makes personal infra legible \u2014 not centralized overnight, but documented so a successor can find it.</p>';
}

// ═══════ Tab Navigation ═══════
function switchTab(tabId) {
  document.querySelectorAll('.tab-nav button').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
    btn.setAttribute('aria-selected', btn.dataset.tab === tabId);
  });
  document.querySelectorAll('.tab-content').forEach(function(tc) {
    tc.classList.toggle('active', tc.id === 'tab-' + tabId);
  });
}

document.querySelectorAll('.tab-nav button').forEach(function(btn) {
  btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
});

// Keyboard: 1-5 for tabs
document.addEventListener('keydown', function(ev) {
  var tabs = ['diagram','platforms','timeline','roles','risk'];
  var num = parseInt(ev.key);
  if (num >= 1 && num <= 5 && !ev.ctrlKey && !ev.metaKey && !ev.altKey) {
    var active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
    switchTab(tabs[num - 1]);
  }
});

// ═══════ Initialize ═══════
renderCards();
renderPlatforms();
renderTimeline();
renderRoles();
renderRisk();
</script>
</body>
</html>
